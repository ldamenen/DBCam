name: Deploy web client to GitHub Pages

# Publishes the web client + shared Core over HTTPS (required for getUserMedia on
# iOS Safari). Site layout (ARCHITECTURE §7):
#   /            -> redirect to /web-poc/
#   /web-poc/    -> the app (imports ../core/src/* relative to the site root)
#   /core/       -> the shared decision Core
# The old bookmark URL https://<owner>.github.io/<repo>/ keeps working via the
# root redirect.

on:
  push:
    branches: [main]
    paths:
      - 'web-poc/**'
      - 'core/**'
      - 'index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Least-privilege token scoped to what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true turns Pages on via the API on first run, so no manual
      # Settings -> Pages toggle is needed (turnkey).
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Assemble the site: web client + Core + root redirect. Assembling into
      # _site (instead of uploading the repo root) keeps .git and docs out of
      # the published artifact.
      - name: Assemble site
        run: |
          mkdir _site
          cp -r web-poc _site/web-poc
          cp -r core _site/core
          cp index.html _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
